<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobren Logística - Acesso</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; margin-bottom: 1rem; }
        button { width: 100%; padding: 0.8rem; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .loader { display: none; text-align: center; font-size: 0.8rem; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Jobren Logística</h2>
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com">
        <label>Senha</label>
        <input type="password" id="password" placeholder="••••••••">
        <button id="btnLogin">Entrar no Sistema</button>
        <div id="loader" class="loader">Verificando cargo...</div>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loader = document.getElementById('loader');

            if (!email || !password) return alert("Preencha tudo!");

            loader.style.display = 'block';
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Erro: " + error.message);
                loader.style.display = 'none';
            } else {
                const { data: perfil } = await supabaseClient.from('perfis').select('funcao').eq('id', data.user.id).single();
                
                localStorage.setItem('user_role', perfil.funcao);
                
                // Redirecionamento automático
                const paginas = { 'comercial': 'comercial.html', 'operacional': 'operacional.html', 'financeiro': 'financeiro.html', 'admin': 'financeiro.html' };
                window.location.href = paginas[perfil.funcao] || 'index.html';
            }
        });
    </script>
</body>
</html>
