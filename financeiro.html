<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobren - Financeiro Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 1300px; margin: auto; }
        h2 { color: #1e293b; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .stat label { font-size: 0.8rem; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .stat div { font-size: 1.5rem; font-weight: 700; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 0.7rem; color: #475569; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; color: #1e293b; }
        
        .badge-pgto { background: #e0e7ff; color: #4338ca; padding: 4px 8px; border-radius: 4px; font-weight: 600; font-size: 0.75rem; }
        .badge-status { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        
        .btn { border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-excel { background: #166534; color: white; margin-right: 10px; }
        .btn-refresh { background: var(--primary); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container">
    <h2>
        💰 Gestão Financeira Jobren
        <div>
            <button class="btn btn-excel" onclick="baixarExcel()">📊 Exportar Excel</button>
            <button class="btn btn-refresh" onclick="carregarFinanceiro()">🔄 Atualizar</button>
        </div>
    </h2>

    <div class="card-stats">
        <div class="stat"><label>Receita Total</label><div id="totalReceita" style="color: var(--primary)">R$ 0,00</div></div>
        <div class="stat"><label>Custos Motoristas</label><div id="totalCustos" style="color: var(--danger)">R$ 0,00</div></div>
        <div class="stat"><label>Lucro Líquido</label><div id="totalLucro" style="color: var(--success)">R$ 0,00</div></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Data Registro</th>
                <th>Vendedor</th>
                <th>Cliente / Rota</th>
                <th>Pagamento</th>
                <th>Receita</th>
                <th>Custo Total</th>
                <th>Lucro</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tabelaFinanceiro">
            <tr><td colspan="8" style="text-align:center; padding: 40px;">Carregando dados...</td></tr>
        </tbody>
    </table>
</div>

<script src="config.js"></script>
<script>
    let dadosParaExcel = [];

    function formatarData(isoString) {
        if (!isoString) return "---";
        const d = new Date(isoString);
        return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function carregarFinanceiro() {
        try {
            const { data, error } = await supabaseClient
                .from('propostas')
                .select(`*, operacoes!fk_vinculo_final (*)`)
                .order('created_at', { ascending: false });

            if (error) throw error;

            let html = '';
            let somaReceita = 0, somaCustos = 0;
            dadosParaExcel = [];

            data.forEach(item => {
                const op = item.operacoes?.[0] || null;
                const custoTotal = (op?.valor_m1 || 0) + (op?.valor_m2 || 0);
                const receita = item.valor_frete_cliente || 0;
                const lucro = receita - custoTotal;
                const pgto = item.forma_pagamento || "Não informado";

                somaReceita += receita;
                somaCustos += custoTotal;

                // Objeto para o Excel (Com formatação profissional)
                dadosParaExcel.push({
                    "DATA/HORA": formatarData(item.created_at),
                    "VENDEDOR": item.vendedor_nome || "---",
                    "CLIENTE": item.cliente_nome,
                    "ORIGEM": item.cidade_origem,
                    "DESTINO": item.cidade_destino,
                    "FORMA PGTO": pgto.toUpperCase(),
                    "RECEITA (R$)": receita,
                    "CUSTO (R$)": custoTotal,
                    "LUCRO (R$)": lucro,
                    "MOTORISTA 1": op?.motorista_1 || "---"
                });

                html += `
                    <tr>
                        <td><small>${formatarData(item.created_at)}</small></td>
                        <td><strong>${item.vendedor_nome || '---'}</strong></td>
                        <td>
                            <strong>${item.cliente_nome}</strong><br>
                            <small style="color: #64748b">${item.cidade_origem} ➔ ${item.cidade_destino}</small>
                        </td>
                        <td><span class="badge-pgto">${pgto}</span></td>
                        <td style="font-weight: 600">R$ ${receita.toLocaleString('pt-BR',
