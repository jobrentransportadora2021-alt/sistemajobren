<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobren - Financeiro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .container { max-width: 700px; margin: auto; }
        h2 { color: #2563eb; border-bottom: 2px solid #e2e8f0; pb: 10px; }
        
        .card { 
            background: white; padding: 20px; border-radius: 12px; 
            border-left: 8px solid #2563eb; margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        .info-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: bold; }
        .valor { font-weight: 600; font-size: 1.1rem; }
        
        .lucro-destaque { 
            background: #dcfce7; padding: 12px; border-radius: 8px; 
            text-align: center; border: 1px solid #bbf7d0; margin-top: 15px;
        }
        .lucro-texto { color: #166534; font-size: 1.3rem; font-weight: 800; }
    </style>
</head>
<body>

    <div class="container">
        <h2>💰 Resumo Financeiro Operacional</h2>
        <div id="lista">Carregando dados sincronizados...</div>
    </div>

    <script src="config.js"></script>
    
    <script>
        async function carregarFinanceiro() {
            const listaDiv = document.getElementById('lista');

            try {
                // Buscando da VIEW que acabamos de criar
                const { data, error } = await supabaseClient
                    .from('financeiro_consolidado')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    listaDiv.innerHTML = "<p>Nenhuma operação com proposta vinculada encontrada.</p>";
                    return;
                }

                listaDiv.innerHTML = data.map(i => {
                    const receita = Number(i.receita || 0);
                    const custo = Number(i.custo_previsto || 0);
                    const lucro = Number(i.lucro_estimado || 0);

                    return `
                        <div class="card">
                            <div class="label">Cliente</div>
                            <div class="valor" style="font-size: 1.3rem; margin-bottom: 15px;">👤 ${i.cliente_nome || 'Não identificado'}</div>
                            
                            <div class="info-row">
                                <div>
                                    <span class="label">Receita do Frete</span>
                                    <span class="valor" style="color: #2563eb;">R$ ${receita.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                </div>
                                <div>
                                    <span class="label">Custo Previsto</span>
                                    <span class="valor" style="color: #dc2626;">R$ ${custo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                </div>
                            </div>

                            <div class="lucro-destaque">
                                <span class="label" style="color: #166534;">Lucro Estimado</span>
                                <span class="lucro-texto">R$ ${lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error("Erro:", err);
                listaDiv.innerHTML = `<p style="color:red">Erro ao carregar: ${err.message}</p>`;
            }
        }

        carregarFinanceiro();
    </script>
</body>
</html>
