<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobren - Financeiro 70/30</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 1600px; margin: auto; }
        
        .filters { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; gap: 15px; align-items: flex-end; margin-bottom: 25px; flex-wrap: wrap; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.85rem; }

        .card-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .stat label { font-size: 0.75rem; color: #64748b; font-weight: 600; }
        .stat div { font-size: 1.3rem; font-weight: 700; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 0.7rem; color: #475569; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        
        /* Botões de Confirmação */
        .btn-group { display: flex; gap: 5px; }
        .btn-confirma { border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.2s; }
        .confirmado { background: var(--success); color: white; cursor: default; }
        .pendente { background: #e2e8f0; color: #475569; }
        .pendente:hover { background: #cbd5e1; }

        .btn-excel { background: #166534; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>💰 Financeiro Jobren (Controle 70/30)</h2>
        <button class="btn-excel" onclick="baixarExcel()">📊 Exportar Excel</button>
    </div>

    <div class="filters">
        <div class="field"><label>Início</label><input type="date" id="dataInicio"></div>
        <div class="field"><label>Fim</label><input type="date" id="dataFim"></div>
        <div class="field"><label>Vendedor</label><select id="filtroVendedor"><option value="">Todos</option></select></div>
        <div class="field"><label>Forma</label><select id="filtroForma"><option value="">Todas</option><option value="pix">PIX</option><option value="boleto">BOLETO</option></select></div>
        <button class="btn-confirma confirmado" style="padding: 10px 20px;" onclick="carregarFinanceiro()">🔍 Filtrar</button>
    </div>

    <div class="card-stats">
        <div class="stat"><label>Receita Bruta</label><div id="totalReceita" style="color:var(--primary)">R$ 0,00</div></div>
        <div class="stat"><label>Total Efetivo em Caixa</label><div id="totalPago" style="color:var(--success)">R$ 0,00</div></div>
        <div class="stat"><label>A Receber (Pendentes)</label><div id="totalPendente" style="color:var(--warning)">R$ 0,00</div></div>
        <div class="stat"><label>Lucro Líquido</label><div id="totalLucro">R$ 0,00</div></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Vendedor</th>
                <th>Cliente</th>
                <th>Forma</th>
                <th>Valor Total</th>
                <th>Confirmação de PGTO</th>
                <th>Saldo Recebido</th>
            </tr>
        </thead>
        <tbody id="tabelaFinanceiro"></tbody>
    </table>
</div>

<script src="config.js"></script>
<script>
    let dadosParaExcel = [];
    let vendedoresUnicos = new Set();

    async function carregarFinanceiro() {
        const dInic = document.getElementById('dataInicio').value;
        const dFim = document.getElementById('dataFim').value;
        const vend = document.getElementById('filtroVendedor').value;
        const forma = document.getElementById('filtroForma').value;

        try {
            let query = supabaseClient.from('propostas').select(`*, operacoes!fk_vinculo_final (*)`).order('created_at', { ascending: false });

            if (dInic) query = query.gte('created_at', dInic + 'T00:00:00');
            if (dFim) query = query.lte('created_at', dFim + 'T23:59:59');
            if (vend) query = query.eq('vendedor_nome', vend);
            if (forma) query = query.ilike('forma_pagamento', `%${forma}%`);

            const { data, error } = await query;
            if (error) throw error;

            let html = '', sReceita = 0, sPagoReal = 0, sLucro = 0;
            dadosParaExcel = [];

            data.forEach(item => {
                if (item.vendedor_nome) vendedoresUnicos.add(item.vendedor_nome);
                
                const receita = item.valor_frete_cliente || 0;
                const op = item.operacoes?.[0] || null;
                const custo = (op?.valor_m1 || 0) + (op?.valor_m2 || 0);
                
                // Cálculo de parcelas
                const valor70 = receita * 0.7;
                const valor30 = receita * 0.3;
                
                // Soma o que já foi confirmado
                let recebidoDesteFrete = 0;
                if (item.pago_70) recebidoDesteFrete += valor70;
                if (item.pago_30) recebidoDesteFrete += valor30;

                sReceita += receita;
                sPagoReal += recebidoDesteFrete;
                sLucro += (receita - custo);

                dadosParaExcel.push({
                    "DATA": new Date(item.created_at).toLocaleDateString('pt-BR'),
                    "CLIENTE": item.cliente_nome,
                    "VENDEDOR": item.vendedor_nome,
                    "VALOR TOTAL": receita,
                    "VALOR RECEBIDO": recebidoDesteFrete,
                    "STATUS 70%": item.pago_70 ? "PAGO" : "PENDENTE",
                    "STATUS 30%": item.pago_30 ? "PAGO" : "PENDENTE"
                });

                html += `
                    <tr>
                        <td><small>${new Date(item.created_at).toLocaleDateString('pt-BR')}</small></td>
                        <td>${item.vendedor_nome || '---'}</td>
                        <td><strong>${item.cliente_nome}</strong></td>
                        <td>${(item.forma_pagamento || '---').toUpperCase()}</td>
                        <td style="font-weight:600">R$ ${receita.toLocaleString('pt-BR')}</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn-confirma ${item.pago_70 ? 'confirmado' : 'pendente'}" 
                                    onclick="confirmarParcial('${item.id}', 'pago_70', ${item.pago_70})">
                                    ${item.pago_70 ? '✅ 70%' : '⏳ 70%'}
                                </button>
                                <button class="btn-confirma ${item.pago_30 ? 'confirmado' : 'pendente'}" 
                                    onclick="confirmarParcial('${item.id}', 'pago_30', ${item.pago_30})">
                                    ${item.pago_30 ? '✅ 30%' : '⏳ 30%'}
                                </button>
                            </div>
                        </td>
                        <td style="font-weight:bold; color:var(--success)">R$ ${recebidoDesteFrete.toLocaleString('pt-BR')}</td>
                    </tr>`;
            });

            document.getElementById('tabelaFinanceiro').innerHTML = html;
            document.getElementById('totalReceita').innerText = `R$ ${sReceita.toLocaleString('pt-BR')}`;
            document.getElementById('totalPago').innerText = `R$ ${sPagoReal.toLocaleString('pt-BR')}`;
            document.getElementById('totalPendente').innerText = `R$ ${(sReceita - sPagoReal).toLocaleString('pt-BR')}`;
            document.getElementById('totalLucro').innerText = `R$ ${sLucro.toLocaleString('pt-BR')}`;
            
            atualizarVendedoresNoFiltro();
        } catch (e) { console.error(e); }
    }

    async function confirmarParcial(id, campo, valorAtual) {
        if (valorAtual) return; // Se já estiver pago, não faz nada
        const confirmacao = confirm(`Confirmar recebimento desta parcela?`);
        if (!confirmacao) return;

        const { error } = await supabaseClient.from('propostas').update({ [campo]: true }).eq('id', id);
        if (error) alert("Erro ao atualizar."); else carregarFinanceiro();
    }

    function atualizarVendedoresNoFiltro() {
        const select = document.getElementById('filtroVendedor');
        const valorAtual = select.value;
        select.innerHTML = '<option value="">Todos</option>';
        Array.from(vendedoresUnicos).sort().forEach(v => {
            select.innerHTML += `<option value="${v}" ${v === valorAtual ? 'selected' : ''}>${v}</option>`;
        });
    }

    function baixarExcel() {
        const ws = XLSX.utils.json_to_sheet(dadosParaExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Financeiro");
        XLSX.writeFile(wb, `Financeiro_Jobren_70_30.xlsx`);
    }

    window.onload = () => {
        const agora = new Date();
        document.getElementById('dataInicio').value = new Date(agora.getFullYear(), agora.getMonth(), 1).toISOString().split('T')[0];
        document.getElementById('dataFim').value = new Date(agora.getFullYear(), agora.getMonth() + 1, 0).toISOString().split('T')[0];
        carregarFinanceiro();
    };
</script>
</body>
</html>
