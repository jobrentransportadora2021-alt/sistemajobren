<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jobren - Financeiro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .item { background: white; padding: 15px; border-radius: 8px; border-left: 6px solid #2563eb; margin-bottom: 10px; }
        .lucro { color: #166534; font-weight: bold; }
    </style>
</head>
<body>
    <h2>💰 Financeiro - Resumo de Lucros</h2>
    <div id="lista"></div>

    <script src="config.js"></script>
    <script>
        async function carregar() {
            const { data } = await supabaseClient.from('financeiro_consolidado').select('*');
            document.getElementById('lista').innerHTML = data.map(i => `
                <div class="item">
                    <strong>Cliente: ${i.cliente_nome}</strong><br>
                    Receita: R$ ${i.receita} | Custos: R$ ${i.custo_total}<br>
                    <span class="lucro">LUCRO: R$ ${i.lucro_operacional}</span>
                </div>
            `).join('');
        }
        carregar();
    </script>
</body>
</html>
