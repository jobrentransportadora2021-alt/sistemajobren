<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobren - Financeiro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1300px; margin: auto; }
        .card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .stat label { font-size: 0.8rem; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .stat div { font-size: 1.5rem; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 0.7rem; color: #475569; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        .badge-pgto { background: #e0e7ff; color: #4338ca; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .btn { border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>💰 Painel Financeiro Jobren</h2>
        <div>
            <button class="btn" style="background:#166534; color:white" onclick="baixarExcel()">📊 Excel</button>
            <button class="btn" style="background:#2563eb; color:white" onclick="carregarFinanceiro()">🔄 Atualizar</button>
        </div>
    </div>

    <div class="card-stats">
        <div class="stat"><label>Receita</label><div id="totalReceita" style="color:var(--primary)">R$ 0,00</div></div>
        <div class="stat"><label>Custos</label><div id="totalCustos" style="color:var(--danger)">R$ 0,00</div></div>
        <div class="stat"><label>Lucro</label><div id="totalLucro" style="color:var(--success)">R$ 0,00</div></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Vendedor</th>
                <th>Cliente / Rota</th>
                <th>Pagamento</th>
                <th>Receita</th>
                <th>Custo Op.</th>
                <th>Lucro</th>
            </tr>
        </thead>
        <tbody id="tabelaFinanceiro">
            <tr><td colspan="7" style="text-align:center">Buscando dados no banco...</td></tr>
        </tbody>
    </table>
</div>

<script src="config.js"></script>
<script>
    let dadosParaExcel = [];

    async function carregarFinanceiro() {
        try {
            // Chamada com o vínculo novo "fk_relacao_direta"
            const { data, error } = await supabaseClient
                .from('propostas')
                .select(`
                    *,
                    operacoes!fk_relacao_direta (*)
                `)
                .order('created_at', { ascending: false });

            if (error) throw error;

            let html = '';
            let sReceita = 0, sCustos = 0;
            dadosParaExcel = [];

            data.forEach(item => {
                const op = item.operacoes?.[0] || null;
                const custo = (op?.valor_m1 || 0) + (op?.valor_m2 || 0);
                const receita = item.valor_frete_cliente || 0;
                const lucro = receita - custo;
                const pgto = item.forma_pagamento || "---";

                sReceita += receita;
                sCustos += custo;

                dadosParaExcel.push({
                    "DATA": new Date(item.created_at).toLocaleDateString('pt-BR'),
                    "VENDEDOR": item.vendedor_nome || "---",
                    "CLIENTE": item.cliente_nome,
                    "ROTA": `${item.cidade_origem} x ${item.cidade_destino}`,
                    "PAGAMENTO": pgto,
                    "RECEITA": receita,
                    "CUSTO": custo,
                    "LUCRO": lucro
                });

                html += `
                    <tr>
                        <td>${new Date(item.created_at).toLocaleDateString('pt-BR')}</td>
                        <td><strong>${item.vendedor_nome || '---'}</strong></td>
                        <td><b>${item.cliente_nome}</b><br><small>${item.cidade_origem} -> ${item.cidade_destino}</small></td>
                        <td><span class="badge-pgto">${pgto}</span></td>
                        <td>R$ ${receita.toLocaleString('pt-BR')}</td>
                        <td style="color:red">R$ ${custo.toLocaleString('pt-BR')}</td>
                        <td style="font-weight:bold; color:green">R$ ${lucro.toLocaleString('pt-BR')}</td>
                    </tr>`;
            });

            document.getElementById('tabelaFinanceiro').innerHTML = html;
            document.getElementById('totalReceita').innerText = `R$ ${sReceita.toLocaleString('pt-BR')}`;
            document.getElementById('totalCustos').innerText = `R$ ${sCustos.toLocaleString('pt-BR')}`;
            document.getElementById('totalLucro').innerText = `R$ ${(sReceita - sCustos).toLocaleString('pt-BR')}`;

        } catch (e) {
            document.getElementById('tabelaFinanceiro').innerHTML = `<tr><td colspan="7">Erro: ${e.message}</td></tr>`;
        }
    }

    function baixarExcel() {
        const ws = XLSX.utils.json_to_sheet(dadosParaExcel);
        ws['!cols'] = [{wch:15},{wch:15},{wch:25},{wch:25},{wch:15},{wch:12},{wch:12},{wch:12}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Financeiro");
        XLSX.writeFile(wb, "Financeiro_Jobren.xlsx");
    }

    window.onload = carregarFinanceiro;
</script>
</body>
</html>
