<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobren - Financeiro Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        h2 { color: #1e293b; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .stat label { font-size: 0.8rem; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .stat div { font-size: 1.5rem; font-weight: 700; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 0.8rem; color: #475569; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        .btn { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-excel { background: #166534; color: white; margin-right: 10px; }
        .btn-refresh { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>
        💰 Painel Financeiro 
        <div>
            <button class="btn btn-excel" onclick="baixarExcel()">📊 Baixar Excel</button>
            <button class="btn btn-refresh" onclick="carregarFinanceiro()">🔄 Atualizar</button>
        </div>
    </h2>

    <div class="card-stats">
        <div class="stat"><label>Receita Total</label><div id="totalReceita" style="color: var(--primary)">R$ 0,00</div></div>
        <div class="stat"><label>Custos (Motoristas)</label><div id="totalCustos" style="color: var(--danger)">R$ 0,00</div></div>
        <div class="stat"><label>Lucro Real</label><div id="totalLucro" style="color: var(--success)">R$ 0,00</div></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Cliente / Rota</th>
                <th>Receita</th>
                <th>Custo Total</th>
                <th>Lucro</th>
                <th>Motoristas</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tabelaFinanceiro">
            <tr><td colspan="6" style="text-align:center">Buscando dados no servidor...</td></tr>
        </tbody>
    </table>
</div>

<script src="config.js"></script>
<script>
    let dadosParaExcel = [];

    async function carregarFinanceiro() {
        try {
            // BUSCA PROPOSTA + OPERACAO (mesmo que a operacao ainda não exista)
            const { data, error } = await supabaseClient
                .from('propostas')
                .select(`
                    *,
                    operacoes (*)
                `)
                .order('created_at', { ascending: false });

            if (error) throw error;

            let html = '';
            let somaReceita = 0;
            let somaCustos = 0;
            dadosParaExcel = [];

            data.forEach(item => {
                // Pegamos a primeira operação vinculada (se houver)
                const op = item.operacoes && item.operacoes.length > 0 ? item.operacoes[0] : null;
                
                const custoTotal = (op?.valor_m1 || 0) + (op?.valor_m2 || 0);
                const receita = item.valor_frete_cliente || 0;
                const lucro = receita - custoTotal;

                somaReceita += receita;
                somaCustos += custoTotal;

                const nomesMotoristas = op ? `${op.motorista_1 || ''} ${op.motorista_2 ? '/ ' + op.motorista_2 : ''}` : '---';

                dadosParaExcel.push({
                    "Cliente": item.cliente_nome,
                    "Vendedor": item.vendedor_nome,
                    "Receita": receita,
                    "Custo": custoTotal,
                    "Lucro": lucro,
                    "Motoristas": nomesMotoristas
                });

                html += `
                    <tr>
                        <td><strong>${item.cliente_nome}</strong><br><small>${item.cidade_origem} ➔ ${item.cidade_destino}</small></td>
                        <td>R$ ${receita.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                        <td style="color: var(--danger)">R$ ${custoTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                        <td style="font-weight: bold; color: ${lucro >= 0 ? 'var(--success)' : 'var(--danger)'}">
                            R$ ${lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                        </td>
                        <td><small>${nomesMotoristas}</small></td>
                        <td>
                            <span class="badge" style="background: ${op ? '#dcfce7' : '#f1f5f9'}; color: ${op ? '#166534' : '#64748b'}">
                                ${op ? 'Operacional OK' : 'Pend. Operac.'}
                            </span>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('tabelaFinanceiro').innerHTML = html;
            document.getElementById('totalReceita').innerText = `R$ ${somaReceita.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('totalCustos').innerText = `R$ ${somaCustos.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('totalLucro').innerText = `R$ ${(somaReceita - somaCustos).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

        } catch (e) {
            document.getElementById('tabelaFinanceiro').innerHTML = `<tr><td colspan="6">Erro: ${e.message}</td></tr>`;
        }
    }

    function baixarExcel() {
        const worksheet = XLSX.utils.json_to_sheet(dadosParaExcel);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Financeiro");
        XLSX.writeFile(workbook, `Financeiro_Jobren.xlsx`);
    }

    window.onload = carregarFinanceiro;
</script>
</body>
</html>
