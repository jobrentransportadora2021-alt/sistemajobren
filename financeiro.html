<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jobren - Financeiro Integrado</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .container { max-width: 700px; margin: auto; }
        .card { 
            background: white; padding: 20px; border-radius: 15px; 
            border-left: 10px solid #2563eb; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .box { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; font-weight: bold; }
        .valor { font-size: 1.1rem; font-weight: 700; display: block; }
        .lucro-box { 
            margin-top: 15px; padding: 15px; border-radius: 10px; text-align: center;
            font-size: 1.4rem; font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>💰 Financeiro: Comercial + Operacional</h2>
        <div id="lista">Sincronizando...</div>
    </div>

    <script src="config.js"></script>
    <script>
        async function carregar() {
            const { data, error } = await supabaseClient
                .from('financeiro_consolidado')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('lista').innerHTML = "Erro ao carregar view.";
                return;
            }

            document.getElementById('lista').innerHTML = data.map(i => {
                const lucro = Number(i.lucro_liquido);
                return `
                    <div class="card">
                        <span style="font-weight:bold; font-size:1.2rem;">👤 ${i.cliente_nome || 'Sem vínculo'}</span>
                        <div class="grid">
                            <div class="box">
                                <span class="label">Receita (Comercial)</span>
                                <span class="valor" style="color:#2563eb">R$ ${Number(i.receita_comercial).toLocaleString('pt-BR')}</span>
                            </div>
                            <div class="box">
                                <span class="label">Custo (Operacional)</span>
                                <span class="valor" style="color:#dc2626">R$ ${Number(i.custo_operacional).toLocaleString('pt-BR')}</span>
                            </div>
                        </div>
                        <div class="lucro-box" style="background:${lucro >= 0 ? '#dcfce7' : '#fee2e2'}; color:${lucro >= 0 ? '#166534' : '#991b1b'}">
                            <span class="label" style="color:inherit">Resultado Final</span>
                            R$ ${lucro.toLocaleString('pt-BR')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        carregar();
    </script>
</body>
</html>
