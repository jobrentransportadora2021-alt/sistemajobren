<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobren - Operacional Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; border-bottom: 2px solid #2563eb; padding-bottom: 10px; margin-bottom: 20px; }
        
        .info-comercial { background: #fff7ed; border: 1px solid #ffedd5; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-item { background: white; padding: 8px; border-radius: 6px; border: 1px solid #ffedd5; }
        .info-label { font-size: 0.7rem; color: #7c2d12; display: block; font-weight: bold; }

        .form-group { margin-bottom: 15px; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #475569; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        
        .rota-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-salvar { background: #2563eb; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-salvar:disabled { background: #94a3b8; }
        #mensagem { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚚 Registro Operacional</h2>
    
    <div class="form-group">
        <label>Selecione a Carga (Vendedor):</label>
        <select id="selectProposta" onchange="vincularDadosComerciais()">
            <option value="">Carregando propostas...</option>
        </select>
    </div>

    <div id="painelComercial" class="info-comercial">
        <div class="grid-info">
            <div class="info-item"><span class="info-label">FRETE ACORDADO</span><span id="infoFrete" style="font-weight:bold">R$ 0,00</span></div>
            <div class="info-item"><span class="info-label">VENDEDOR</span><span id="infoVendedor">---</span></div>
        </div>
    </div>

    <div class="form-group" style="background: #f8fafc;">
        <label>📍 Origem da Carga:</label>
        <div class="rota-grid">
            <select id="estadoOrigem"><option value="">Estado</option></select>
            <select id="cidadeOrigem" disabled><option value="">Cidade</option></select>
        </div>

        <label>📍 Destino Final:</label>
        <div class="rota-grid">
            <select id="estadoDestino"><option value="">Estado</option></select>
            <select id="cidadeDestino" disabled><option value="">Cidade</option></select>
        </div>
    </div>

    <div class="form-group">
        <label>👤 Motorista:</label>
        <input type="text" id="nomeMotorista" placeholder="Nome do motorista">
        <label>Valor Pago ao Motorista (R$):</label>
        <input type="number" id="valorMotorista" step="0.01">
    </div>

    <button onclick="salvarOperacional()" id="btnAcao" class="btn-salvar">Finalizar Registro</button>
    <div id="mensagem"></div>
</div>

<script src="config.js"></script>
<script>
    let listaPropostas = [];

    // 1. Carregar Estados ao Iniciar
    async function carregarEstados() {
        const selects = [document.getElementById('estadoOrigem'), document.getElementById('estadoDestino')];
        try {
            const response = await fetch("https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome");
            const estados = await response.json();
            const options = estados.map(e => `<option value="${e.sigla}">${e.nome}</option>`).join('');
            
            selects.forEach(s => s.innerHTML += options);
        } catch (e) { console.error("Erro Estados:", e); }
    }

    // 2. Buscar Cidades Dinamicamente
    async function carregarCidades(sigla, selectId, cidadePreSelecionada = null) {
        const selectCidade = document.getElementById(selectId);
        if (!sigla) return;

        selectCidade.disabled = true;
        selectCidade.innerHTML = '<option>Carregando...</option>';

        try {
            const response = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${sigla}/municipios?orderBy=nome`);
            const cidades = await response.json();
            
            selectCidade.innerHTML = '<option value="">Selecione a Cidade</option>' + 
                cidades.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            
            selectCidade.disabled = false;

            if (cidadePreSelecionada) {
                selectCidade.value = cidadePreSelecionada;
            }
        } catch (e) { console.error("Erro Cidades:", e); }
    }

    // Eventos de mudança manual
    document.getElementById('estadoOrigem').addEventListener('change', (e) => carregarCidades(e.target.value, 'cidadeOrigem'));
    document.getElementById('estadoDestino').addEventListener('change', (e) => carregarCidades(e.target.value, 'cidadeDestino'));

    // 3. Vincular dados quando o operacional seleciona a proposta
    function vincularDadosComerciais() {
        const id = document.getElementById('selectProposta').value;
        const p = listaPropostas.find(item => item.id == id);

        if (p) {
            document.getElementById('painelComercial').style.display = 'block';
            document.getElementById('infoFrete').innerText = `R$ ${Number(p.valor_frete).toLocaleString('pt-BR')}`;
            document.getElementById('infoVendedor').innerText = p.vendedor_nome;

            // Preenchimento Automático dos Estados (Se o vendedor salvou a sigla)
            if (p.estado_origem) {
                document.getElementById('estadoOrigem').value = p.estado_origem;
                carregarCidades(p.estado_origem, 'cidadeOrigem', p.cidade_origem);
            }
            if (p.estado_destino) {
                document.getElementById('estadoDestino').value = p.estado_destino;
                carregarCidades(p.estado_destino, 'cidadeDestino', p.cidade_destino);
            }
        }
    }

    // 4. Carregar Propostas do Supabase
    async function inicializar() {
        await carregarEstados();
        const { data } = await supabaseClient.from('propostas').select('*').order('created_at', { ascending: false });
        listaPropostas = data;
        document.getElementById('selectProposta').innerHTML = '<option value="">-- Selecione --</option>' + 
            data.map(p => `<option value="${p.id}">${p.cliente_nome}</option>`).join('');
    }

    async function salvarOperacional() {
        const msg = document.getElementById('mensagem');
        const dados = {
            proposta_id: document.getElementById('selectProposta').value,
            origem: document.getElementById('cidadeOrigem').value + " - " + document.getElementById('estadoOrigem').value,
            destino: document.getElementById('cidadeDestino').value + " - " + document.getElementById('estadoDestino').value,
            motorista_nome: document.getElementById('nomeMotorista').value,
            valor_pago_motorista: parseFloat(document.getElementById('valorMotorista').value) || 0,
            status_viagem: "Iniciada",
            data_operacao: new Date().toISOString()
        };

        try {
            const { error } = await supabaseClient.from('operacoes').insert([dados]);
            if (error) throw error;
            msg.innerHTML = "<span style='color:green'>✅ Registrado com Sucesso!</span>";
            setTimeout(() => location.reload(), 2000);
        } catch (e) {
            msg.innerHTML = "<span style='color:red'>❌ Erro: " + e.message + "</span>";
        }
    }

    window.onload = inicializar;
</script>
</body>
</html>
