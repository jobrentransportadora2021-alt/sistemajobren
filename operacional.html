<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobren - Painel Operacional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; border-bottom: 2px solid #2563eb; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .motorista-extra { background: #f8fafc; border: 1px dashed #cbd5e1; margin-top: 10px; display: none; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #475569; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .btn-add { background: #64748b; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-bottom: 15px; }
        .btn-salvar { background: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-salvar:hover { background: #1d4ed8; }
        .btn-salvar:disabled { background: #94a3b8; }
        #mensagem { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚚 Registro Operacional</h2>
        
        <div class="form-group">
            <label>Selecione a Carga:</label>
            <select id="selectProposta">
                <option value="">Carregando propostas...</option>
            </select>
        </div>

        <div class="form-group" style="background: #eff6ff;">
            <label>👤 Motorista Principal (ou Coleta):</label>
            <input type="text" id="nomeMotorista1" placeholder="Nome do motorista">
            <label>Valor Pago (R$):</label>
            <input type="number" id="valor1" step="0.01" placeholder="Ex: 1000.00">
        </div>

        <button type="button" class="btn-add" id="btnExpandir" onclick="toggleMotoristaExtra()">+ Adicionar Segundo Motorista (Entrega)</button>

        <div id="blocoExtra" class="form-group motorista-extra">
            <label>👤 Segundo Motorista (Entrega):</label>
            <input type="text" id="nomeMotorista2" placeholder="Nome do segundo motorista">
            <label>Valor Pago Extra (R$):</label>
            <input type="number" id="valor2" step="0.01" placeholder="Ex: 500.00">
        </div>

        <div class="form-group">
            <label>Placa do Veículo:</label>
            <input type="text" id="placa" placeholder="ABC-1234">
        </div>

        <button onclick="salvarOperacional()" id="btnAcao" class="btn-salvar">Finalizar e Somar Custos</button>
        <div id="mensagem"></div>
    </div>

    <script src="config.js"></script>
    <script>
        function toggleMotoristaExtra() {
            const bloco = document.getElementById('blocoExtra');
            const btn = document.getElementById('btnExpandir');
            if (bloco.style.display === 'none' || bloco.style.display === '') {
                bloco.style.display = 'block';
                btn.innerText = "- Remover Segundo Motorista";
            } else {
                bloco.style.display = 'none';
                btn.innerText = "+ Adicionar Segundo Motorista (Entrega)";
                document.getElementById('nomeMotorista2').value = "";
                document.getElementById('valor2').value = "";
            }
        }

        async function carregarPropostas() {
            const select = document.getElementById('selectProposta');
            try {
                const { data, error } = await supabaseClient.from('propostas').select('id, cliente_nome').order('created_at', { ascending: false });
                if (error) throw error;
                select.innerHTML = '<option value="">-- Selecione o Cliente --</option>' + 
                    data.map(p => `<option value="${p.id}">${p.cliente_nome} (Ref: ${p.id})</option>`).join('');
            } catch (error) {
                select.innerHTML = '<option>Erro ao carregar</option>';
            }
        }

        async function salvarOperacional() {
            const btn = document.getElementById('btnAcao');
            const msg = document.getElementById('mensagem');
            
            const propostaId = document.getElementById('selectProposta').value;
            const nome1 = document.getElementById('nomeMotorista1').value;
            const valor1 = parseFloat(document.getElementById('valor1').value) || 0;
            const nome2 = document.getElementById('nomeMotorista2').value;
            const valor2 = parseFloat(document.getElementById('valor2').value) || 0;
            const placa = document.getElementById('placa').value;

            if (!propostaId || valor1 <= 0) {
                alert("Selecione a carga e informe o valor do primeiro motorista!");
                return;
            }

            const valorTotalCusto = valor1 + valor2;
            const nomesConcatenados = nome2 ? `${nome1} / ${nome2}` : nome1;

            btn.disabled = true;
            msg.innerText = "Registrando...";

            try {
                const { error } = await supabaseClient
                    .from('operacoes')
                    .insert([{
                        proposta_id: propostaId,
                        valor_pago_motorista: valorTotalCusto,
                        // Certifique-se que essas colunas existem no seu banco:
                        // nome_motorista: nomesConcatenados, 
                        // placa: placa 
                    }]);

                if (error) throw error;

                msg.style.color = "green";
                msg.innerText = `✅ Sucesso! Total R$ ${valorTotalCusto.toFixed(2)} registrado.`;
                
                // Limpar campos
                document.querySelectorAll('input').forEach(i => i.value = "");
                document.getElementById('blocoExtra').style.display = 'none';
                carregarPropostas();

            } catch (error) {
                msg.style.color = "red";
                msg.innerText = "Erro: " + error.message;
            } finally {
                btn.disabled = false;
            }
        }

        window.onload = carregarPropostas;
    </script>
</body>
</html>
