<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jobren - Operacional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .box-mot { background: #f8fafc; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        h2 { color: var(--primary); }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; margin-top: 5px; }
        button { width: 100%; background: #059669; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚚 Operacional - Lançamento de Viagem</h2>
        
        <label>Selecione a Carga (Vinda do Comercial):</label>
        <select id="select_proposta"><option>Carregando...</option></select>

        <div class="grid">
            <div class="box-mot">
                <strong>Motorista 1 (Origem → Base)</strong>
                <label>Nome:</label>
                <input type="text" id="mot1">
                <label>Valor Pago (R$):</label>
                <input type="number" id="vlr1">
            </div>
            <div class="box-mot">
                <strong>Motorista 2 (Base → Destino)</strong>
                <label>Nome:</label>
                <input type="text" id="mot2">
                <label>Valor Pago (R$):</label>
                <input type="number" id="vlr2">
            </div>
        </div>

        <label>Rota / Observações:</label>
        <input type="text" id="rota" placeholder="Ex: SP -> Aracaju -> Salvador">

        <button onclick="finalizarViagem()">Finalizar e Mandar p/ Financeiro</button>
    </div>

    <script src="config.js"></script>
    <script>
        async function carregarPropostas() {
            const { data } = await supabaseClient.from('propostas').select('*').eq('status', 'pendente');
            const select = document.getElementById('select_proposta');
            select.innerHTML = data.map(p => `<option value="${p.id}">${p.cliente_nome} - R$ ${p.valor_frete_cliente}</option>`).join('');
        }
        carregarPropostas();

        async function finalizarViagem() {
            const propId = document.getElementById('select_proposta').value;
            const { error } = await supabaseClient.from('operacoes').insert([{
                proposta_id: propId,
                motorista_nome: document.getElementById('mot1').value,
                valor_pago_motorista: document.getElementById('vlr1').value,
                motorista_2_nome: document.getElementById('mot2').value,
                valor_pago_motorista_2: document.getElementById('vlr2').value,
                rota_dois: document.getElementById('rota').value
            }]);

            if (!error) {
                await supabaseClient.from('propostas').update({ status: 'operacionalizado' }).eq('id', propId);
                alert("Viagem enviada ao Financeiro!");
                location.reload();
            }
        }
    </script>
</body>
</html>
