<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobren - Painel Operacional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; border-bottom: 2px solid #2563eb; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #475569; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 16px; }
        .btn-salvar { background: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-salvar:hover { background: #1d4ed8; }
        .btn-salvar:disabled { background: #94a3b8; cursor: not-allowed; }
        #mensagem { margin-top: 15px; text-align: center; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚚 Registro Operacional (Custo)</h2>
        
        <div class="form-group">
            <label>Selecione a Carga (Comercial):</label>
            <select id="selectProposta">
                <option value="">Carregando propostas...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Valor Pago ao Motorista (Custo):</label>
            <input type="number" id="valorMotorista" step="0.01" placeholder="Ex: 1200.00">
        </div>

        <div class="form-group">
            <label>Placa do Veículo:</label>
            <input type="text" id="placa" placeholder="ABC-1234">
        </div>

        <button onclick="salvarOperacional()" id="btnAcao" class="btn-salvar">Finalizar e Gerar Custo</button>
        <div id="mensagem"></div>
    </div>

    <script src="config.js"></script>
    <script>
        // 1. Carrega as propostas do comercial
        async function carregarPropostas() {
            const select = document.getElementById('selectProposta');
            try {
                const { data, error } = await supabaseClient
                    .from('propostas')
                    .select('id, cliente_nome')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    select.innerHTML = '<option value="">Nenhuma proposta encontrada</option>';
                    return;
                }

                select.innerHTML = '<option value="">-- Selecione o Cliente --</option>' + 
                    data.map(p => `<option value="${p.id}">${p.cliente_nome} (ID: ${p.id})</option>`).join('');
            
            } catch (error) {
                console.error("Erro ao carregar:", error);
                select.innerHTML = '<option>Erro ao carregar dados</option>';
            }
        }

        // 2. Salva o custo na tabela 'operacoes'
        async function salvarOperacional() {
            const btn = document.getElementById('btnAcao');
            const propostaId = document.getElementById('selectProposta').value;
            const valorCusto = document.getElementById('valorMotorista').value;
            const placaVeiculo = document.getElementById('placa').value;
            const msg = document.getElementById('mensagem');

            if (!propostaId || !valorCusto) {
                alert("Preencha a carga e o valor!");
                return;
            }

            btn.disabled = true;
            msg.style.color = "#475569";
            msg.innerText = "Salvando custo...";

            try {
                // Removida a coluna data_operacao que causava erro
                const { error } = await supabaseClient
                    .from('operacoes')
                    .insert([{
                        proposta_id: propostaId,
                        valor_pago_motorista: parseFloat(valorCusto),
                        placa: placaVeiculo
                    }]);

                if (error) throw error;

                msg.style.color = "#16a34a";
                msg.innerText = "✅ Sucesso! O Financeiro foi atualizado.";
                
                // Limpa campos
                document.getElementById('valorMotorista').value = "";
                document.getElementById('placa').value = "";
                document.getElementById('selectProposta').value = "";
                
                carregarPropostas();

            } catch (error) {
                console.error("Erro detalhado:", error);
                msg.style.color = "#dc2626";
                // Exibe uma mensagem mais clara para o usuário
                msg.innerText = "Erro: " + (error.message.includes("schema cache") 
                    ? "O banco está se atualizando, tente novamente em 1 minuto." 
                    : error.message);
            } finally {
                btn.disabled = false;
            }
        }

        window.onload = carregarPropostas;
    </script>
</body>
</html>
