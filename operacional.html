<script src="config.js"></script>
<script>
    let propostasLocais = [];

    // Cálculo do total em tempo real
    document.addEventListener('input', () => {
        const v1 = parseFloat(document.getElementById('vlr1').value) || 0;
        const v2 = parseFloat(document.getElementById('vlr2').value) || 0;
        document.getElementById('total_display').innerText = (v1 + v2).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    });

    async function carregar() {
        const { data, error } = await supabaseClient.from('propostas').select('*').eq('status', 'pendente');
        if (error) return console.error("Erro ao carregar:", error);
        
        propostasLocais = data;
        const select = document.getElementById('select_proposta');
        select.innerHTML = data.length > 0 ? 
            '<option value="">Selecione a carga no pátio...</option>' + data.map(p => `<option value="${p.id}">${p.cliente_nome} | ${p.origem || 'Sem Origem'} > ${p.destino || 'Sem Destino'}</option>`).join('') :
            '<option value="">Não há cargas pendentes.</option>';
    }

    function mostrarDetalhes() {
        const p = propostasLocais.find(x => x.id == document.getElementById('select_proposta').value);
        const det = document.getElementById('detalhes_carga');
        if (p) {
            det.style.display = 'block';
            document.getElementById('view_cliente').innerText = p.cliente_nome;
            document.getElementById('view_origem').innerText = p.origem || "Não informada";
            document.getElementById('view_destino').innerText = p.destino || "Não informado";
            document.getElementById('view_vendedor').innerText = p.vendedor_nome;
            document.getElementById('view_teto').innerText = `R$ ${parseFloat(p.valor_sugerido_operacional || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('view_foto').src = p.foto_url || "https://via.placeholder.com/150?text=Sem+Foto";
        } else {
            det.style.display = 'none';
        }
    }

    async function finalizarOperacao() {
        const idProposta = document.getElementById('select_proposta').value;
        const p = propostasLocais.find(x => x.id == idProposta);
        
        const m1 = document.getElementById('mot1').value;
        const v1 = parseFloat(document.getElementById('vlr1').value) || 0;
        const m2 = document.getElementById('mot2').value || "";
        const v2 = parseFloat(document.getElementById('vlr2').value) || 0;

        // Validação de segurança para evitar o erro "null value in column origem"
        if (!idProposta) return alert("Selecione uma carga primeiro!");
        if (!p.origem || !p.destino) return alert("Esta carga não possui Origem/Destino cadastrados no Comercial. Corrija antes de finalizar.");
        if (!m1 || v1 <= 0) return alert("Informe o Motorista e o Valor do Frete!");

        const { error: errorInsert } = await supabaseClient.from('operacoes').insert([{
            identificação_id: idProposta, 
            origem: p.origem,
            destino: p.destino,
            motorista_nome: m1,
            valor_pago_motorista: v1,
            motorista_2_nome: m2,
            valor_pago_motorista_2: v2,
            status_viagem: 'em_transito'
        }]);

        if (!errorInsert) {
            // Se salvou a operação, marca a proposta como concluída
            await supabaseClient.from('propostas').update({ status: 'concluido' }).eq('id', idProposta);
            alert("✅ Viagem registrada! Dados enviados ao financeiro.");
            location.reload();
        } else {
            console.error("Erro técnico:", errorInsert);
            alert("Erro no banco: " + errorInsert.message);
        }
    }

    carregar();
</script>
